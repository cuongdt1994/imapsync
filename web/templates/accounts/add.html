{% extends "base.html" %}
{% block title %}Add Account — IMAPsync{% endblock %}

{% block content %}
<h1>Add Account</h1>

<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

    <label>
        Name <small>(display label, e.g. "WorkMail user@domain")</small>
        <input type="text" name="name" required autofocus>
    </label>

    <div class="grid">
        <label>
            Role
            <select name="role" required>
                <option value="source">Source</option>
                <option value="destination">Destination</option>
            </select>
        </label>
        <label>
            Provider
            <select name="provider" id="provider">
                <option value="generic">Generic IMAP</option>
                <option value="workmail">AWS WorkMail</option>
                <option value="gmail">Google Workspace</option>
            </select>
        </label>
    </div>

    <div class="grid">
        <label>
            IMAP Host
            <input type="text" name="imap_host" id="imap_host" required
                   placeholder="imap.mailserver.com">
        </label>
        <label>
            Port
            <input type="number" name="imap_port" id="imap_port" value="993" required>
        </label>
    </div>

    <div class="grid">
        <label>
            Username <small>(full email address)</small>
            <input type="text" name="username" required
                   placeholder="user@domain.com">
        </label>
        <label>
            Password <small>(App Password for Google)</small>
            <input type="password" name="password" required>
        </label>
    </div>

    <label>
        Notes <small>(optional)</small>
        <input type="text" name="notes" placeholder="e.g. Marketing dept">
    </label>

    <div style="display: flex; gap: 0.5rem;">
        <button type="submit">💾 Save Account</button>
        <a href="{{ url_for('web.account_list') }}" role="button" class="secondary">Cancel</a>
    </div>
</form>

<script>
const IMAP_HOSTS = {
    gmail:    { host: 'imap.gmail.com', port: 993 },
    workmail: { host: 'imap.mail.us-east-1.awsapps.com', port: 993 },
};
const providerEl = document.getElementById('provider');
const hostEl = document.getElementById('imap_host');
const portEl = document.getElementById('imap_port');

providerEl.addEventListener('change', function () {
    const preset = IMAP_HOSTS[this.value];
    if (preset) {
        hostEl.value = preset.host;
        portEl.value = preset.port;
    } else {
        hostEl.value = '';
        portEl.value = 993;
    }
});
</script>
{% endblock %}
