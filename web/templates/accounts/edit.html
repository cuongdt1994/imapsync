{% extends "base.html" %}
{% block title %}Edit Account — IMAPsync{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-900 mb-2">Edit Account</h1>
    <p class="text-gray-500 mb-6">{{ account.name }}</p>

    <form method="POST" class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 space-y-5">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
            <input type="text" name="name" value="{{ account.name }}" required
                   class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Role</label>
                <select name="role" required
                        class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-white">
                    <option value="source" {% if account.role == 'source' %}selected{% endif %}>Source</option>
                    <option value="destination" {% if account.role == 'destination' %}selected{% endif %}>Destination</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Provider</label>
                <select name="provider" id="provider"
                        class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-white">
                    <option value="generic" {% if account.provider == 'generic' %}selected{% endif %}>Generic IMAP</option>
                    <option value="workmail" {% if account.provider == 'workmail' %}selected{% endif %}>AWS WorkMail</option>
                    <option value="gmail" {% if account.provider == 'gmail' %}selected{% endif %}>Google Workspace</option>
                </select>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">IMAP Host</label>
                <input type="text" name="imap_host" id="imap_host" value="{{ account.imap_host }}" required
                       class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Port</label>
                <input type="number" name="imap_port" id="imap_port" value="{{ account.imap_port }}" required
                       class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" name="username" value="{{ account.username }}" required
                       class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password <span class="text-gray-400 font-normal">(leave empty to keep current)</span></label>
                <input type="password" name="password" placeholder="(unchanged)"
                       class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Notes <span class="text-gray-400 font-normal">(optional)</span></label>
            <input type="text" name="notes" value="{{ account.notes or '' }}"
                   class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
        </div>

        <div class="flex items-center gap-3 pt-2">
            <button type="submit"
                    class="inline-flex items-center gap-1.5 px-5 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium text-sm transition-colors">
                💾 Save Changes
            </button>
            <a href="{{ url_for('web.account_list') }}"
               class="inline-flex items-center gap-1.5 px-5 py-2.5 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 font-medium text-sm transition-colors">
                Cancel
            </a>
        </div>
    </form>
</div>

<script>
const IMAP_HOSTS = {
    gmail:    { host: 'imap.gmail.com', port: 993 },
    workmail: { host: 'imap.mail.us-east-1.awsapps.com', port: 993 },
};
const providerEl = document.getElementById('provider');
const hostEl = document.getElementById('imap_host');
const portEl = document.getElementById('imap_port');

providerEl.addEventListener('change', function () {
    const preset = IMAP_HOSTS[this.value];
    if (preset) {
        hostEl.value = preset.host;
        portEl.value = preset.port;
    } else {
        hostEl.value = '';
        portEl.value = 993;
    }
});
</script>
{% endblock %}
