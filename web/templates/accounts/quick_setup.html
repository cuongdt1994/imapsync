{% extends "base.html" %}
{% block title %}Quick Setup — IMAPsync{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-900 mb-2">Quick Setup</h1>
    <p class="text-gray-500 mb-6">Create source and destination accounts in one step.</p>

    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Source column -->
            <div class="bg-white rounded-xl shadow-sm border-t-4 border-indigo-500 p-6 space-y-4">
                <h2 class="text-lg font-semibold text-gray-900 flex items-center gap-2">
                    <span class="w-2.5 h-2.5 rounded-full bg-indigo-500"></span> Source Account
                </h2>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                    <input type="text" name="source_name" required placeholder="e.g. WorkMail Source"
                           class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Provider</label>
                    <select name="source_provider" id="source_provider"
                            class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 bg-white">
                        <option value="generic">Generic IMAP</option>
                        <option value="workmail">AWS WorkMail</option>
                        <option value="gmail">Google Workspace</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">IMAP Host</label>
                        <input type="text" name="source_imap_host" id="source_imap_host" required placeholder="imap.mailserver.com"
                               class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Port</label>
                        <input type="number" name="source_imap_port" id="source_imap_port" value="993" required
                               class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                        <input type="text" name="source_username" required placeholder="user@domain.com"
                               class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                        <input type="password" name="source_password" required
                               class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Notes <span class="text-gray-400 font-normal">(optional)</span></label>
                    <input type="text" name="source_notes" placeholder="e.g. Old server"
                           class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                </div>
            </div>

            <!-- Destination column -->
            <div class="bg-white rounded-xl shadow-sm border-t-4 border-purple-500 p-6 space-y-4">
                <h2 class="text-lg font-semibold text-gray-900 flex items-center gap-2">
                    <span class="w-2.5 h-2.5 rounded-full bg-purple-500"></span> Destination Account
                </h2>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                    <input type="text" name="dest_name" required placeholder="e.g. Gmail Dest"
                           class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-purple-500 focus:ring-1 focus:ring-purple-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Provider</label>
                    <select name="dest_provider" id="dest_provider"
                            class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-purple-500 focus:ring-1 focus:ring-purple-500 bg-white">
                        <option value="generic">Generic IMAP</option>
                        <option value="workmail">AWS WorkMail</option>
                        <option value="gmail">Google Workspace</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">IMAP Host</label>
                        <input type="text" name="dest_imap_host" id="dest_imap_host" required placeholder="imap.mailserver.com"
                               class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-purple-500 focus:ring-1 focus:ring-purple-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Port</label>
                        <input type="number" name="dest_imap_port" id="dest_imap_port" value="993" required
                               class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-purple-500 focus:ring-1 focus:ring-purple-500">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                        <input type="text" name="dest_username" required placeholder="user@domain.com"
                               class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-purple-500 focus:ring-1 focus:ring-purple-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                        <input type="password" name="dest_password" required
                               class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-purple-500 focus:ring-1 focus:ring-purple-500">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Notes <span class="text-gray-400 font-normal">(optional)</span></label>
                    <input type="text" name="dest_notes" placeholder="e.g. New server"
                           class="block w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-purple-500 focus:ring-1 focus:ring-purple-500">
                </div>
            </div>
        </div>

        <div class="flex items-center gap-3 mt-8">
            <button type="submit"
                    class="inline-flex items-center gap-1.5 px-6 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium text-sm transition-colors shadow-sm">
                ⚡ Create Both Accounts
            </button>
            <a href="{{ url_for('web.account_list') }}"
               class="inline-flex items-center gap-1.5 px-6 py-2.5 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 font-medium text-sm transition-colors">
                Cancel
            </a>
        </div>
    </form>
</div>

<script>
const IMAP_HOSTS = {
    gmail:    { host: 'imap.gmail.com', port: 993 },
    workmail: { host: 'imap.mail.us-east-1.awsapps.com', port: 993 },
};
['source', 'dest'].forEach(function(prefix) {
    var providerEl = document.getElementById(prefix + '_provider');
    var hostEl = document.getElementById(prefix + '_imap_host');
    var portEl = document.getElementById(prefix + '_imap_port');
    if (providerEl) {
        providerEl.addEventListener('change', function() {
            var preset = IMAP_HOSTS[this.value];
            if (preset) {
                hostEl.value = preset.host;
                portEl.value = preset.port;
            } else {
                hostEl.value = '';
                portEl.value = 993;
            }
        });
    }
});
</script>
{% endblock %}
